<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="text-center">

    <form method="post" action="/login" class="bg-light p-4 rounded mb-3" style="width:300px;">

        <h3 class="mb-3">Admin</h3>

        <input type="text" name="user" placeholder="Usuario" class="form-control mb-2" required>
        <input type="password" name="pass" placeholder="Contraseña" class="form-control mb-3" required>

        <button class="btn btn-dark w-100">Entrar</button>

    </form>

    <a href="/" class="btn btn-secondary">Volver a tienda</a>

</div>

</body>
</html>
