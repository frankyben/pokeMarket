<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">

<div class="container">

    <div class="mb-3">
        <a href="/" class="btn btn-secondary">Volver a tienda</a>
    </div>

    <h2>Inventario Pokémon</h2>

    <h4>Total inventario: $<span th:text="${totalInventario != null ? totalInventario : 0}"></span></h4>

    <form th:action="@{/pokemon/guardar}" method="post" th:object="${variante}" class="row g-3 mb-4">

        <div class="col-md-2">
            <input type="text" th:field="*{pokemon.nombre}" class="form-control" placeholder="Nombre" required>
        </div>

        <div class="col-md-2">
            <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="Precio">
        </div>

        <div class="col-md-2">
            <input type="number" th:field="*{stock}" class="form-control" placeholder="Stock">
        </div>

        <div class="col-md-2">
            <select th:field="*{forma}" class="form-select">
                <option value="NORMAL">Normal</option>
                <option value="DINAMAX">Dinamax</option>
                <option value="GIGAMAX">Gigamax</option>
            </select>
        </div>


        <div class="col-md-2 d-flex align-items-center">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" th:field="*{shiny}">
                <label class="form-check-label">✨ Shiny</label>
            </div>
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-dark w-100">Guardar</button>
        </div>

    </form>


    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>Pokémon</th>
            <th>Forma</th>
            <th>Shiny</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Total</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${variantes}">
            <td th:text="${p.pokemon.nombre}"></td>
            <td th:text="${p.forma}"></td>
            <td th:text="${p.shiny}"></td>
            <td th:text="${p.precio}"></td>


            <td>
                <form th:action="@{/pokemon/editarStock}" method="post" class="d-flex gap-1">
                    <input type="hidden" name="id" th:value="${p.id}">
                    <input type="number" name="stock" th:value="${p.stock}" class="form-control" style="width:80px">
                    <button class="btn btn-primary btn-sm">OK</button>
                </form>
            </td>


            <td th:text="${p.precio * p.stock}"></td>

            <td>
                <a th:href="@{/pokemon/eliminar/{id}(id=${p.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script src="/js/app.js"></script>
</body>
</html>
